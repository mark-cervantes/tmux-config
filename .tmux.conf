set -g mouse on
set-option -g history-limit 5000
set-option -ga terminal-overrides ",xterm-256color:Tc"
set -gs default-terminal "screen-256color"
set -g display-panes-time 2000

# Session picker: native choose-tree UI, grouped-session switch on selection
bind-key s choose-tree -sZ -O name -f '#{?#{m:term_*,#{session_name}},0,1}' \
  "run-shell 'tmux-switch-grouped \"%%\" \"#{client_name}\"'"

# Clipboard integration - more complete version
set -g set-clipboard on
set-option -g default-command "zsh"

set -g remain-on-exit on
set -g pane-died 'if -F "#{&&:#{==:#{session_windows},1},#{==:#{window_panes},1}}" "killp; detach" "killp"'
set -g detach-on-destroy off

# Copy mode settings
setw -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -in -selection clipboard"

# Additional clipboard bindings for redundancy
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "xclip -i -selection clipboard"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "xclip -selection clipboard -i"

# fix nvim waiting bug
set -sg escape-time 0
set -g default-terminal "tmux-256color"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect' 
set -g @resurrect-auto-restore 'off'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'spywhere/tmux-named-snapshot'

# Add an actual gruvbox theme plugin (pick the one you use)
set -g @plugin 'egel/tmux-gruvbox'   # example
set -g @tmux-gruvbox 'dark256'
set -g @continuum-restore 'off'
set -g @continuum-save-interval '15'

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

# Override status-left to show the group name (e.g. "timmy") instead of
# the internal grouped-session name (e.g. "term_1234_5678901234")
set -g status-left "#[bg=colour241,fg=colour248] #{?session_grouped,#{session_group},#S} #[bg=colour237,fg=colour241,nobold,noitalics,nounderscore]"
